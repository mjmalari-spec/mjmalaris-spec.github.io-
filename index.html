<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Lady ♡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: bgMove 12s ease infinite;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        .floating-item {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            z-index: 0;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            from { transform: translateY(0) rotate(0deg); opacity: 1; }
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        #noBtn { transition: all 0.2s ease; position: absolute; }

        .envelope-wrapper {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .envelope-wrapper:hover { transform: translateY(-15px) scale(1.05); }

        .letter-paper {
            background: #fff9f9;
            background-image: radial-gradient(#f1f1f1 1.1px, transparent 0);
            background-size: 22px 22px;
        }

        .handwritten { font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Taylor Swift - Fearless (Taylor's Version) (Lyric Video) [7lLigiVgJsE].mp3" type="audio/mpeg">
    </audio>

    <div id="lockScreen" class="z-10 w-full max-w-sm p-4">
        <div class="glass p-8 text-center text-white shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">For Your Eyes Only 🔒</h2>
            <div class="flex justify-center gap-3 mb-8" id="pinDisplay">
                <div class="w-12 h-16 glass flex items-center justify-center text-3xl font-bold">•</div>
                <div class="w-12 h-16 glass flex items-center justify-center text-3xl font-bold">•</div>
                <div class="w-12 h-16 glass flex items-center justify-center text-3xl font-bold">•</div>
                <div class="w-12 h-16 glass flex items-center justify-center text-3xl font-bold">•</div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <script>
                    for(let i=1; i<=9; i++) {
                        document.write(`<button onclick="enterDigit('${i}')" class="py-4 glass hover:bg-white/40 rounded-xl text-2xl font-semibold transition">${i}</button>`);
                    }
                </script>
                <button onclick="clearPin()" class="py-4 bg-red-400/40 hover:bg-red-400/60 rounded-xl font-bold transition">Clear</button>
                <button onclick="enterDigit('0')" class="py-4 glass rounded-xl text-2xl font-semibold transition">0</button>
                <button onclick="deleteDigit()" class="py-4 glass rounded-xl text-2xl transition">⌫</button>
            </div>
        </div>
    </div>

    <div id="proposalScreen" class="hidden z-10 w-full max-w-md text-center p-4">
        <div class="glass p-10 relative overflow-hidden" style="min-height: 400px;">
            <div class="text-7xl mb-6">🐱❤️</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-12 font-serif">Will you be my girlfriend?</h2>
            <div class="relative h-20 w-full" id="buttonContainer">
                <button id="yesBtn" onclick="acceptProposal()" class="bg-pink-500 hover:bg-pink-600 text-white px-12 py-3 rounded-full absolute left-4 shadow-lg transition-transform active:scale-95 z-20">Yes 💖</button>
                <button id="noBtn" class="bg-white text-gray-500 px-12 py-3 rounded-full right-4 shadow-md z-10">No 🙈</button>
            </div>
            <p class="mt-16 text-gray-500 italic text-sm">Will you be ✨</p>
        </div>
    </div>

    <div id="mainContent" class="hidden z-10 w-full max-w-6xl p-6 text-center">
        <h1 class="text-center text-white text-4xl md:text-5xl font-serif mb-12 drop-shadow-xl handwritten">Happy 5th Monthsary, Baby! 🤍</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div onclick="showLetter('heart')" class="envelope-wrapper glass p-10">
                <i class="fa-solid fa-heart text-6xl text-rose-500 mb-4 animate-pulse"></i>
                <h3 class="text-xl font-bold text-gray-800 uppercase">Letter from Heart</h3>
                <p class="text-rose-600 mt-2">Click to read 💌</p>
            </div>
            <div onclick="showLetter('open')" class="envelope-wrapper glass p-10">
                <i class="fa-solid fa-envelope-open-text text-6xl text-rose-400 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-800 uppercase">Open Me</h3>
                <p class="text-rose-500 mt-2">Click to read 🌸</p>
            </div>
            <div onclick="showLetter('notes')" class="envelope-wrapper glass p-10">
                <i class="fa-solid fa-star text-6xl text-rose-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-800 uppercase">Special Notes</h3>
                <p class="text-rose-400 mt-2">Click to read ✨</p>
            </div>
        </div>

        <div class="glass p-8 mb-12">
            <h2 class="text-3xl text-center text-gray-800 font-serif mb-8 italic">~ My Girlfriend ~</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <img src="tats1.jpeg" class="rounded-xl w-full h-64 object-cover shadow-lg" alt="">
                <img src="tats2.jpeg" class="rounded-xl w-full h-64 object-cover shadow-lg" alt="">
                <img src="tats3.jpeg" class="rounded-xl w-full h-64 object-cover shadow-lg" alt="">
                <img src="tats4.jpeg" class="rounded-xl w-full h-64 object-cover shadow-lg" alt="">
                <img src="tats5.jpg" class="rounded-xl w-full h-64 object-cover shadow-lg" alt="">
            </div>
        </div>
    </div>

    <div id="letterModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="letter-paper rounded-lg p-8 md:p-12 max-w-2xl w-full shadow-2xl relative my-8">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-rose-500 text-2xl">✕</button>
            <div id="modalContent" class="text-gray-800 leading-relaxed space-y-4 text-lg text-left"></div>
            <div class="mt-12 text-right">
                <p class="text-gray-500 handwritten text-2xl">Always yours,</p>
                <p class="text-rose-600 font-bold text-xl">Babyy ❤️</p>
            </div>
        </div>
    </div>

    <script>
        const correctPin = "0502";
        let enteredPin = "";
        const music = document.getElementById('bgMusic');

        const letters = {
            heart: { 
                title: "Letter from Heart", 
                text: `<p>and baby, since it’s May 2 na… <b>happy 5th monthsary ng pag-uusap natin 🤍</b></p>
                       <p>From simple talks hanggang sa naging part ka na ng everyday ko. thank you for staying, for your time, and for letting me be part of your life kahit sa ganitong paraan lang.</p>
                       <p>I really appreciate you more than words can explain. I still choose to stay and understand you. kasi ikaw yun eh, and you’re worth it for me.</p>
                       <p>I’m looking forward to more memories with you. thank you for being you, baby. I love you so much 🤍</p>` 
            },
            open: { 
                title: "Open Me", 
                text: `<p>I’m so thankful po na nakilala kita. I really appreciate having you in my life. You’ve become someone special to me, and I’m grateful for all the moments, talks, and memories we’ve shared. Thank you for staying and being you. 🤍</p>` 
            },
            notes: { 
                title: "Special Notes", 
                text: `<p><b>TATS 🦖 I miss you so much po 🥺</b></p>
                       <p>To be honest po, natatakot ako na mawala ka sa’kin... You make my life brighter and lighter simula nung nakilala kita. felt like home...</p>
                       <p>I’m really thankful kay God na nakilala kita. Mag-pray ka palagi ha, surrender mo lang lahat ng worries mo kay God.</p>
                       <p>Andito lang po ako lagi para sa’yo. I love you po im always here po lagi mokong kakampi🤍</p>` 
            }
        };

        function enterDigit(num) {
            if (enteredPin.length < 4) {
                enteredPin += num;
                const boxes = document.querySelectorAll('#pinDisplay > div');
                boxes.forEach((box, i) => box.textContent = i < enteredPin.length ? enteredPin[i] : '•');
                
                if (enteredPin.length === 4) {
                    setTimeout(() => {
                        if (enteredPin === correctPin) {
                            document.getElementById('lockScreen').classList.add('hidden');
                            document.getElementById('proposalScreen').classList.remove('hidden');
                        } else {
                            alert("Mali baby! ❤️"); enteredPin = "";
                            boxes.forEach(box => box.textContent = '•');
                        }
                    }, 300);
                }
            }
        }
        function deleteDigit() { enteredPin = enteredPin.slice(0, -1); const boxes = document.querySelectorAll('#pinDisplay > div'); boxes.forEach((box, i) => box.textContent = i < enteredPin.length ? enteredPin[i] : '•'); }
        function clearPin() { enteredPin = ""; document.querySelectorAll('#pinDisplay > div').forEach(box => box.textContent = '•'); }

        const noBtn = document.getElementById("noBtn");
        noBtn.addEventListener("mouseenter", () => {
            const randomX = (Math.random() - 0.5) * 250;
            const randomY = (Math.random() - 0.5) * 200;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });

        // Eto yung function na magpapatugtog pag-click ng YES
        function acceptProposal() {
            music.play().then(() => {
                console.log("Music started!");
            }).catch((err) => {
                console.log("Audio error: ", err);
            });
            
            confetti({ particleCount: 200, spread: 100 });
            document.getElementById('proposalScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        function showLetter(type) {
            document.getElementById('modalContent').innerHTML = `<h2 class="text-3xl font-serif text-rose-500 mb-6 handwritten">${letters[type].title}</h2>` + letters[type].text;
            document.getElementById('letterModal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('letterModal').classList.add('hidden'); }

        setInterval(() => {
            const items = ['❤️', '💗', '🌸', '🦖'];
            const div = document.createElement("div");
            div.className = "floating-item";
            div.innerHTML = items[Math.floor(Math.random() * items.length)];
            div.style.left = Math.random() * 100 + "vw";
            div.style.fontSize = "20px";
            div.style.animationDuration = "6s";
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 6000);
        }, 400);
    </script>
</body>
</html>
